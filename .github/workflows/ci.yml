name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# A new push to the branch cancels the previous run — saves minutes and time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.11.4
      - run: make lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make cover

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make build

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  # Fast, zero-noise gate over the whole repo. typos is a known-misspelling *corpus*,
  # not a dictionary — it only catches common typos in its built-in table.
  spell:
    name: spell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@v1.47.2
        with:
          config: _typos.toml

  # Dictionary spell-check (English + Russian) for what typos structurally cannot see:
  # Russian typos and English misspellings outside its corpus. Run ONLY on the lines this
  # PR adds, so the repo's existing domain vocabulary never turns CI red. Allowlist in cspell.json.
  spell-diff:
    name: spell-diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: install cspell + Russian dictionary
        run: |
          npm install -g cspell@10.0.1 @cspell/dict-ru_ru@2.3.2
          cspell link add @cspell/dict-ru_ru
      - name: cspell on changed lines only
        run: bash .github/scripts/spell-diff.sh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
