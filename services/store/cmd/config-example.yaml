http:
  addr: ":8083"
postgres:
  dsn: "postgres://app:app@localhost:5432/app?sslmode=disable"
redis:
  addr: "localhost:6379"
  password: ""
session:
  cookie_name: "session"
stripe:
  secret_key: "sk_test_..."
  webhook_signing_secret: "whsec_..."
points:
  amounts:
    match_win: 10
    level_up: 25
rewarded:
  cap: 5
  window_seconds: 3600
# internal.api_token gates server-to-server endpoints (e.g. POST
# /v1/points/credit). In Docker it is read from INTERNAL_API_TOKEN. An empty
# value means the internalauth middleware fails closed (503) for those
# endpoints — set it before relying on them.
internal:
  api_token: ""
