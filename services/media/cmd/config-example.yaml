http:
  addr: ":8082"
postgres:
  dsn: "postgres://app:app@localhost:5432/app?sslmode=disable"
storage:
  endpoint: "localhost:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket: "media"
  use_ssl: false
redis:
  addr: "localhost:6379"
  password: ""
session:
  cookie_name: "session"
clips:
  max_upload_bytes: 52428800
  download_url_ttl: "15m"
king_clips:
  daily_ttl: "24h"
  monthly_ttl: "720h"
  ranked_ttl: "24h"
# internal.api_token gates server-to-server endpoints (e.g. DELETE
# /internal/v1/king-clips/:id, used by the koth reset worker). In Docker it
# is read from INTERNAL_API_TOKEN. An empty value means the internalauth
# middleware fails closed (503) for those endpoints — set it before relying
# on them.
internal:
  api_token: ""
