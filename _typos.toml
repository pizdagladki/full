# Allowlist for `typos` — the known-misspelling corpus gate. Used by the CI `spell` job
# (whole repo) and the local .claude hook. typos only flags words in its built-in table, so
# it cannot see Russian typos or English misspellings outside that corpus; the CI `spell-diff`
# job (cspell, English + Russian, allowlist in cspell.json) covers those on changed lines.

[default]
locale = "en-us"

[default.extend-words]
pizdagladki = "pizdagladki"
pizdaglyadelki = "pizdaglyadelki"
coder = "coder"
coturn = "coturn"
pgx = "pgx"
pgxpool = "pgxpool"
minio = "minio"
signaling = "signaling"
matchmaking = "matchmaking"
ratings = "ratings"
zap = "zap"
echo = "echo"

[files]
# cspell.json is the *other* spell-checker's allowlist — it intentionally holds words typos
# considers wrong (e.g. British spellings). Don't let typos lint cspell's dictionary.
extend-exclude = ["go.sum", "package-lock.json", "*.svg", "vendor/", "node_modules/", "*.lock", "frontend/dist/", "cspell.json"]
